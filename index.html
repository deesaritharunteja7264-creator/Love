<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Proposal</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    text-align: center;
    background: linear-gradient(45deg, #ff6a88, #ff99ac);
    color: white;
    overflow: hidden;
}

.container {
    margin-top: 80px;
}

h1 {
    font-size: 40px;
}

#typing {
    font-size: 28px;
    border-right: 2px solid white;
    display: inline;
    padding-right: 5px;
}

.btn {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.yes {
    background: #28a745;
    color: white;
}

.no {
    background: #dc3545;
    color: white;
    position: absolute;
}

#slideshow {
    width: 250px;
    height: 250px;
    margin: 20px auto;
    border-radius: 20px;
    background-size: cover;
    background-position: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

#letter {
    display: none;
    position: fixed;
    top: 20%;
    left: 10%;
    width: 80%;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
}

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">
    <h1>💖 Hey <span id="name">My Love</span> 💖</h1>
    <p id="typing"></p>

    <div id="slideshow"></div>

    <button class="btn yes" onclick="acceptLove()">Yes 💍</button>
    <button class="btn no" id="noBtn" onmouseover="moveNo()">No 😢</button>

    <br>
    <button class="btn" onclick="showLetter()">💌 Read My Letter</button>
</div>

<div id="letter">
    <h2>My Love Letter 💖</h2>
    <p>
        From the moment I saw you, my life changed...  
        You are my happiness, my peace, my everything.  
        I promise to stand with you forever ❤️  
    </p>
    <button onclick="closeLetter()">Close</button>
</div>

<!-- Background Music -->
<audio id="music" autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mp3">
</audio>

<script>
// Typing Effect
let text = "You are the best thing that ever happened to me...";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

// Slideshow
let images = [
    "/IMG-20260312-WA0069.jpg",
    "/IMG-20260312-WA0091.jpg",
    "/IMG-20260312-WA0098.jpg"
];
let index = 0;

function changeImage() {
    document.getElementById("slideshow").style.backgroundImage = "url('" + images[index] + "')";
    index = (index + 1) % images.length;
}
setInterval(changeImage, 2000);
changeImage();

// Move NO button
function moveNo() {
    let btn = document.getElementById("noBtn");
    btn.style.left = Math.random() * window.innerWidth + "px";
    btn.style.top = Math.random() * window.innerHeight + "px";
}

// YES action
function acceptLove() {
    document.body.innerHTML = "<h1 style='margin-top:150px;'>I 💖love you vijaya laxmi💖</h1>";
    setInterval(createHeart, 200);
}

// Floating hearts
function createHeart() {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}

// Letter popup
function showLetter() {
    document.getElementById("letter").style.display = "block";
}

function closeLetter() {
    document.getElementById("letter").style.display = "none";
}
</script>

</body>
</html>
